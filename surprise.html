<style>
	.en-font {

    body {background-image: url('bg1.png');

 main.scrollable-content {

  background-origin: border-box;
  background-image:
    url('bgw.png'),                 
    url('dotdash.svg'),          
    url('dotdash.svg'),          
    url('dotdash-vertical.svg'),

  background-repeat:
    no-repeat,

    repeat-x,     
    repeat-y,
